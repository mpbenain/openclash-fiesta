; ==========================================================
; 方案 B（wcc.best 订阅转换优化版） - DNS 前置 + 纯中文国家组
; ==========================================================

enable_rule_generator=true
overwrite_original_rules=true

; ==========================================================
; DNS 配置（放在最前面，订阅转换最易识别）
; ==========================================================
[dns]
enable = true
ipv6 = false
default-nameserver = 223.5.5.5,119.29.29.29,114.114.114.114
enhanced-mode = fake-ip
fake-ip-range = 198.18.0.1/16
use-hosts = true
respect-rules = true
proxy-server-nameserver = 223.5.5.5,119.29.29.29,114.114.114.114
nameserver = 223.5.5.5,119.29.29.29,114.114.114.114
fallback = 1.1.1.1,8.8.8.8

fallback-filter-geoip = true
fallback-filter-geoip-code = CN
fallback-filter-geosite = gfw
fallback-filter-ipcidr = 240.0.0.0/4
fallback-filter-domain = +.google.com,+.facebook.com,+.youtube.com

; ==========================================================
; 节点清洗
; ==========================================================
exclude=流量|套餐|到期|剩余|重置|官网|网站|最新网址|防失联|失联|官网地址|公告|通知|TG|Telegram|电报|群|频道|说明|使用说明|QQ群|客服|工单|订阅|Expire|Traffic|Reset|Remaining|Expire|Official|Website

; ==========================================================
; 以下规则部分（ruleset）保持你原来的内容不变，从这里继续粘贴你之前的 ruleset=... 直到 custom_proxy_group 之前
; ==========================================================
; （请把你原来所有的 ruleset= 全部粘贴在这里）

; ==========================================================
; 应用分流策略组（纯中文国家组）
; ==========================================================
custom_proxy_group=📦 Notion`select`[]香港`[]台湾`[]日本`[]新加坡`[]美国`[]🧊 冷门节点`[]🧭 手动选择`[]♻️ 自动选择`[]DIRECT`[]🌐 Default
; ... 其他应用组同样把 HK/TW/JP/SG/US 全部替换为 香港/台湾/日本/新加坡/美国 （和之前版本一致）

; Default 等组也同样替换为中文

; ==========================================================
; 国家节点测速组（强化正则，纯中文）
; ==========================================================
custom_proxy_group=🧭 手动选择`select`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`https://www.gstatic.com/generate_204`300,,50

custom_proxy_group=香港`url-test`(?i)(🇭🇰|香港|HK|hongkong)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=台湾`url-test`(?i)(🇹🇼|台湾|TW|taiwan|taipei|hinet)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=日本`url-test`(?i)(🇯🇵|日本|JP|tokyo|osaka)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=新加坡`url-test`(?i)(🇸🇬|新加坡|SG|singapore)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=美国`url-test`(?i)(🇺🇸|美国|US|united states|los angeles|san jose|seattle|new york)`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=🧊 冷门节点`select`(?i)^(?!.*(🇭🇰|香港|HK|hongkong|🇯🇵|日本|JP|tokyo|osaka|🇹🇼|台湾|TW|taiwan|taipei|hinet|🇸🇬|新加坡|SG|singapore|🇺🇸|美国|US|united states|los angeles|san jose|seattle|new york)).*
