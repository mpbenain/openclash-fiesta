[custom]
enable_rule_generator=true
overwrite_original_rules=true

; ==========================================================
; 节点清洗：剔除机场展示/说明/防失联/流量提示节点
; ==========================================================
exclude=流量|套餐|到期|剩余|重置|官网|网站|最新网址|防失联|失联|官网地址|公告|通知|TG|Telegram|电报|群|频道|说明|使用说明|QQ群|客服|工单|订阅|Expire|Traffic|Reset|Remaining|Expire|Official|Website


; ==========================================================
; 1) 规则（自上而下优先级）
; ==========================================================
; --- 私网直连 ---
ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOIP,private,no-resolve

; --- Aethersailor 直连补丁 ---
ruleset=DIRECT,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Domain.yaml,28800
ruleset=DIRECT,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Classical_IP.yaml,28800

; --- 国内直连 ---
ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve

; --- 国内可用 / 下载 / BT ---
ruleset=DIRECT,[]GEOSITE,google-cn
ruleset=DIRECT,[]GEOSITE,category-games@cn
ruleset=DIRECT,[]GEOSITE,category-game-platforms-download
ruleset=DIRECT,[]GEOSITE,category-public-tracker

; --- 核心应用 ---
ruleset=🎬 YouTube,[]GEOSITE,youtube
ruleset=📨 Telegram,[]GEOSITE,telegram
ruleset=📨 Telegram,[]GEOIP,telegram,no-resolve
ruleset=🎥 Netflix,[]GEOSITE,netflix
ruleset=🎥 Netflix,[]GEOIP,netflix,no-resolve
ruleset=🐦 X,[]GEOSITE,twitter

; ruleset=🔎 Google,[]GEOSITE,google
; ruleset=🔎 Google,[]GEOIP,google,no-resolve

; --- Aethersailor 代理补丁（仅兜底用，不越权）---
ruleset=🧭 主代选择,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Domain.yaml,28800
ruleset=🧭 主代选择,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Classical_IP.yaml,28800

; --- GFW 兜底 ---
ruleset=🧭 主代选择,[]GEOSITE,gfw

; --- 非标端口 ---
; ruleset=🔀 非标端口,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Port_Direct.yaml,28800

; --- 最终兜底 ---
ruleset=🧭 主代选择,[]FINAL


; ==========================================================
; 2) 国家及功能代理组定义
; ==========================================================
custom_proxy_group=🧭 主代选择`select`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇩🇪 德国`[]🇭🇰 香港故转`[]`.*`[]DIRECT
custom_proxy_group=♻️ 自动选择`url-test`.*`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇭🇰 香港节点`url-test`(?i)(🇭🇰|香港|\\bHK\\b|hongkong)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇺🇸 美国节点`url-test`(?i)(🇺🇸|美国|\\bUS\\b|united states|los angeles|san jose|seattle|new york)`http://www.gstatic.com/generate_204`300,,50
; custom_proxy_group=🇸🇬 新加坡节点`url-test`(?i)(🇸🇬|新加坡|\\bSG\\b|singapore)`http://www.gstatic.com/generate_204`300,,50
; custom_proxy_group=🇯🇵 日本节点`url-test`(?i)(🇯🇵|日本|\\bJP\\b|tokyo|osaka)`http://www.gstatic.com/generate_204`300,,50
; custom_proxy_group=🇰🇷 韩国节点`url-test`(?i)(🇰🇷|韩国|\\bKR\\b|korea|seoul)`http://www.gstatic.com/generate_204`300,,50
; custom_proxy_group=🇹🇼 台湾节点`url-test`(?i)(🇹🇼|台湾|\\bTW\\b|taiwan|taipei|hinet)`http://www.gstatic.com/generate_204`300,,50
; custom_proxy_group=🇪🇺 欧洲节点`url-test`(?i)(🇬🇧|英国|\\bUK\\b|london|🇩🇪|德国|\\bDE\\b|frankfurt|🇫🇷|法国|\\bFR\\b|paris|🇳🇱|荷兰|\\bNL\\b|amsterdam|🇮🇹|意大利|\\bIT\\b|rome|🇨🇭|瑞士|\\bCH\\b|zurich|🇷🇺|俄罗斯|\\bRU\\b|moscow)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇩🇪 德国`url-test`(?i)(🇩🇪|德国|\\bDE\\b|frankfurt)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇭🇰 香港故转`fallback`(?i)(🇭🇰|香港|\\bHK\\b|hongkong)`http://www.gstatic.com/generate_204`300,,50
; custom_proxy_group=🇭🇰 香港均衡`load-balance`(?i)(🇭🇰|香港|\\bHK\\b|hongkong)`http://www.gstatic.com/generate_204`300,,50

; ==========================================================
; 3) 应用分流策略组 (重构排序：自动->手动->港->美->新->日->韩->台->欧->港故->港均)
; ==========================================================
custom_proxy_group=📨 Telegram`select`[]🧭 主代选择`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇩🇪 德国`[]🇭🇰 香港故转`[]DIRECT
custom_proxy_group=🎬 YouTube`select`[]🧭 主代选择`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇩🇪 德国`[]🇭🇰 香港故转`[]DIRECT
custom_proxy_group=🎥 Netflix`select`[]🧭 主代选择`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇩🇪 德国`[]🇭🇰 香港故转`[]DIRECT
custom_proxy_group=🐦 X`select`[]🧭 主代选择`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇩🇪 德国`[]🇭🇰 香港故转`[]DIRECT
; ==========================================================
; 4) 基础逻辑组 (Default / 漏网之鱼)
; ==========================================================
; custom_proxy_group=🧭 主代选择`select`[]♻️ 自动选择`[]🧭 手动选择`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇩🇪 德国`[]🇯🇵 日本节点`[]🇭🇰 香港故转`[]🧊 冷门节点
; ==========================================================
; 5) 非标端口处理
; ==========================================================
; custom_proxy_group=🔀 非标端口`select`[]🧭 主代选择`[]DIRECT
